{# CAPTA — Módulo bloqueado #}
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Módulo no disponible — CAPTA</title>
</head>
<body>
{% include 'navbar.html' %}
<main class="sp-page" style="max-width:500px;margin:80px auto;text-align:center;padding:40px">
  <div style="font-size:3.5rem;margin-bottom:20px;opacity:.3">
    <i class="fas fa-lock"></i>
  </div>
  <h1 class="sp-page-title" style="margin-bottom:8px">Módulo no disponible</h1>
  <p style="color:var(--muted);font-size:.9rem;margin-bottom:24px">
    Este módulo no está incluido en el plan actual de tu empresa.<br>
    Contacta a tu administrador para activarlo.
  </p>
  <div style="display:inline-flex;align-items:center;gap:6px;background:var(--inp);border:1px solid var(--brd);border-radius:var(--r2);padding:6px 14px;font-size:.75rem;font-family:monospace;color:var(--muted);margin-bottom:28px">
    <i class="fas fa-cube" style="color:var(--accent)"></i>
    {{ modulo }}
  </div>
  <br>
  <a href="/dashboard" class="sp-btn sp-btn-primary">
    <i class="fas fa-home"></i> Volver al Dashboard
  </a>
</main>
</body>
</html>
