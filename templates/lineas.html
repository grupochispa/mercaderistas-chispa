<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Líneas de Producto — CAPTA</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
{% include 'navbar.html' %}

<main class="sp-page">
  <div class="sp-page-hdr">
    <div>
      <h1 class="sp-page-title">Líneas de Producto</h1>
      <p class="sp-page-sub">Define las líneas de tu empresa. Cada producto se asocia a una línea.</p>
    </div>
    <div id="total_badge" class="sp-bdg sp-bdg-accent" style="font-size:.8rem;padding:4px 14px"></div>
  </div>

  <!-- Formulario crear -->
  <div class="sp-card" style="margin-bottom:20px">
    <p class="sp-sec-title">Nueva línea</p>
    <form id="createForm">
      <div class="sp-grid sp-g3 sp-gap4" style="margin-bottom:14px">
        <div style="grid-column:span 2">
          <label class="sp-label">Nombre de la línea *</label>
          <input type="text" id="nombre" class="sp-input" placeholder="Ej: SAL, LECHE, PASTA…" required oninput="this.value=this.value.toUpperCase()">
        </div>
        <div>
          <label class="sp-label">Gramaje base</label>
          <input type="number" id="gramaje_base" class="sp-input" placeholder="Ej: 500" step="0.01" min="0">
        </div>
        <div>
          <label class="sp-label">Unidad</label>
          <select id="unidad_base" class="sp-select">
            <option value="">—</option>
            <option>g</option><option>kg</option><option>ml</option><option>L</option><option>oz</option><option>lb</option>
          </select>
        </div>
        <div>
          <label class="sp-label">Planograma (JPG/PNG)</label>
          <input type="file" id="planogram_file" accept="image/jpeg,image/png" class="sp-input" style="padding:6px" onchange="previewCreate(this)">
          <img id="planogram_preview_create" src="" alt="" style="display:none;margin-top:8px;max-height:70px;border-radius:var(--r1)">
        </div>
      </div>
      <button type="submit" class="sp-btn sp-btn-primary"><i class="fas fa-plus"></i> Crear Línea</button>
    </form>
  </div>

  <!-- Lista de líneas -->
  <div class="sp-card">
    <p class="sp-sec-title">Líneas registradas</p>
    <div id="lineas_list"><div class="sp-skel" style="height:70px;margin-bottom:8px"></div><div class="sp-skel" style="height:70px"></div></div>
  </div>
</main>

<!-- Modal editar -->
<div class="sp-overlay" id="editModal">
  <div class="sp-modal sp-modal-sm">
    <div class="sp-modal-hdr">
      <div><div class="sp-modal-title">Editar Línea</div></div>
      <button class="sp-modal-close" onclick="closeEditModal()"><i class="fas fa-times"></i></button>
    </div>
    <div class="sp-modal-body">
      <form id="editForm">
        <input type="hidden" id="edit_id">
        <div style="margin-bottom:12px">
          <label class="sp-label">Nombre *</label>
          <input type="text" id="edit_nombre" class="sp-input" required oninput="this.value=this.value.toUpperCase()">
        </div>
        <div class="sp-grid sp-g2 sp-gap3" style="margin-bottom:12px">
          <div><label class="sp-label">Gramaje base</label><input type="number" id="edit_gramaje" class="sp-input" step="0.01" min="0"></div>
          <div><label class="sp-label">Unidad</label>
            <select id="edit_unidad" class="sp-select"><option value="">—</option><option>g</option><option>kg</option><option>ml</option><option>L</option><option>oz</option><option>lb</option></select>
          </div>
        </div>
        <div style="margin-bottom:12px">
          <label class="sp-label">Planograma</label>
          <input type="file" id="edit_planogram_file" accept="image/jpeg,image/png" class="sp-input" style="padding:6px" onchange="previewEdit(this)">
          <img id="edit_planogram_preview" src="" style="display:none;margin-top:8px;max-height:80px;border-radius:var(--r1)">
        </div>
        <label style="display:flex;align-items:center;gap:8px;font-size:.83rem;margin-bottom:14px;cursor:pointer">
          <input type="checkbox" id="edit_activa"> Línea activa
        </label>
      </form>
    </div>
    <div class="sp-modal-footer">
      <button class="sp-btn sp-btn-sec" onclick="closeEditModal()">Cancelar</button>
      <button class="sp-btn sp-btn-primary" onclick="saveEdit()"><i class="fas fa-save"></i> Guardar</button>
    </div>
  </div>
</div>

<script>
function waitDb(fn){if(window.db){fn();return;}const t=setInterval(()=>{if(window.db){clearInterval(t);fn();}},50);}
const db={from:(...a)=>window.db.from(...a)};
const empresaId=localStorage.getItem('empresa_id')||await(async()=>{try{const r=await fetch('/api/dashboard/config');if(r.ok){const d=await r.json();localStorage.setItem('empresa_id',d.empresa_id);localStorage.setItem('empresa_nombre',d.empresa_nombre);return d.empresa_id;}return null;}catch{return null;}})();
const STORAGE_BASE='https://djjylikkocemrlsjxscr.supabase.co/storage/v1/object/public/planogramas/';
if(!empresaId){window.location.replace('/');throw new Error('no session');}

function previewCreate(input){const img=document.getElementById('planogram_preview_create');if(input.files[0]){const r=new FileReader();r.onload=e=>{img.src=e.target.result;img.style.display='block';};r.readAsDataURL(input.files[0]);}else img.style.display='none';}
function previewEdit(input){const img=document.getElementById('edit_planogram_preview');if(input.files[0]){const r=new FileReader();r.onload=e=>{img.src=e.target.result;img.style.display='block';};r.readAsDataURL(input.files[0]);}else img.style.display='none';}

async function subirPlanograma(file,nombre){
  const ext=file.name.split('.').pop();
  const path=`${empresaId}/${nombre.replace(/\s+/g,'_')}_${Date.now()}.${ext}`;
  const{error}=await db.storage.from('planogramas').upload(path,file,{upsert:true});
  if(error){captaToast('Error subiendo imagen: '+error.message,'error');return null;}
  return path;
}

async function loadLineas(){
  const{data,error}=await db.from('web_lineas').select('*').eq('empresa_id',empresaId).order('nombre');
  const list=document.getElementById('lineas_list');
  const badge=document.getElementById('total_badge');
  if(error){list.innerHTML='<p style="color:var(--red);text-align:center">Error cargando líneas</p>';return;}
  badge.textContent=`${data.length} línea${data.length!==1?'s':''}`;
  if(!data.length){list.innerHTML='<p style="text-align:center;color:var(--muted);padding:32px 0">Sin líneas. Crea la primera arriba.</p>';return;}
  list.innerHTML=data.map(l=>{
    const actBdg=l.activa?'<span class="sp-bdg sp-bdg-ok">Activa</span>':'<span class="sp-bdg sp-bdg-def">Inactiva</span>';
    const meta=[l.gramaje_base?`${l.gramaje_base} ${l.unidad_base||''}`:null,l.planogram_image?'Con planograma':null].filter(Boolean).join(' · ');
    const thumb=l.planogram_image?`<img src="${STORAGE_BASE}${l.planogram_image}" style="height:48px;width:64px;object-fit:contain;border-radius:var(--r1);border:1px solid var(--brd);background:var(--inp)">`
      :`<div style="height:48px;width:64px;border-radius:var(--r1);border:1px dashed var(--brd);display:flex;align-items:center;justify-content:center"><i class="fas fa-image" style="color:var(--muted);font-size:1.1rem"></i></div>`;
    return `<div style="display:flex;align-items:center;justify-content:space-between;padding:14px;border:1px solid var(--brd);border-radius:var(--r2);background:var(--inp);margin-bottom:8px;gap:12px;flex-wrap:wrap">
      <div style="display:flex;align-items:center;gap:12px">
        ${thumb}
        <div>
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:3px">
            <strong style="font-size:1rem;color:var(--accent);font-family:'Syne',sans-serif">${l.nombre}</strong>
            ${actBdg}
          </div>
          <p style="font-size:.75rem;color:var(--muted)">${meta||'Sin especificaciones'}</p>
        </div>
      </div>
      <div style="display:flex;gap:6px;flex-shrink:0">
        <button onclick="editLinea('${l.id}')" class="sp-btn sp-btn-sec sp-btn-sm"><i class="fas fa-pen"></i> Editar</button>
        <button onclick="toggleActiva('${l.id}',${l.activa})" class="sp-btn sp-btn-sm ${l.activa?'sp-btn-amber':'sp-btn-success'}">${l.activa?'Desactivar':'Activar'}</button>
        <button onclick="deleteLinea('${l.id}','${l.nombre}')" class="sp-btn sp-btn-danger sp-btn-sm"><i class="fas fa-trash"></i></button>
      </div>
    </div>`;
  }).join('');
}

async function toggleActiva(id,actual){
  const{error}=await db.from('web_lineas').update({activa:!actual}).eq('id',id).eq('empresa_id',empresaId);
  if(error){captaToast('Error: '+error.message,'error');return;}
  captaToast(actual?'Línea desactivada':'Línea activada',actual?'warn':'success');
  loadLineas();
}

async function deleteLinea(id,nombre){
  if(!confirm(`¿Eliminar la línea "${nombre}"? Esta acción es irreversible.`))return;
  const{error}=await db.from('web_lineas').delete().eq('id',id).eq('empresa_id',empresaId);
  if(error){captaToast('Error al eliminar','error');return;}
  captaToast('Línea eliminada','success');loadLineas();
}

async function editLinea(id){
  const{data:l,error}=await db.from('web_lineas').select('*').eq('id',id).eq('empresa_id',empresaId).single();
  if(error||!l){captaToast('Error cargando','error');return;}
  document.getElementById('edit_id').value=l.id;
  document.getElementById('edit_nombre').value=l.nombre;
  document.getElementById('edit_gramaje').value=l.gramaje_base||'';
  document.getElementById('edit_unidad').value=l.unidad_base||'';
  document.getElementById('edit_activa').checked=l.activa;
  const prev=document.getElementById('edit_planogram_preview');
  if(l.planogram_image){prev.src=STORAGE_BASE+l.planogram_image;prev.style.display='block';}else prev.style.display='none';
  document.getElementById('editModal').classList.add('open');
}

async function saveEdit(){
  const id=document.getElementById('edit_id').value;
  const nombre=document.getElementById('edit_nombre').value.trim().toUpperCase();
  if(!nombre){captaToast('El nombre es requerido','error');return;}
  let planogramPath=undefined;
  const file=document.getElementById('edit_planogram_file').files[0];
  if(file){planogramPath=await subirPlanograma(file,nombre);if(!planogramPath)return;}
  const payload={nombre,gramaje_base:parseFloat(document.getElementById('edit_gramaje').value)||null,unidad_base:document.getElementById('edit_unidad').value||null,activa:document.getElementById('edit_activa').checked};
  if(planogramPath!==undefined)payload.planogram_image=planogramPath;
  const{error}=await db.from('web_lineas').update(payload).eq('id',id).eq('empresa_id',empresaId);
  if(error){captaToast('Error al guardar: '+error.message,'error');return;}
  captaToast('Línea actualizada','success');closeEditModal();loadLineas();
}

function closeEditModal(){document.getElementById('editModal').classList.remove('open');}
document.getElementById('editModal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeEditModal();});

document.getElementById('createForm').addEventListener('submit',async e=>{
  e.preventDefault();
  const nombre=document.getElementById('nombre').value.trim().toUpperCase();
  if(!nombre){captaToast('El nombre es requerido','error');return;}
  const{data:dup}=await db.from('web_lineas').select('id').eq('empresa_id',empresaId).eq('nombre',nombre).maybeSingle();
  if(dup){captaToast(`Ya existe "${nombre}"`, 'warn');return;}
  let planogramPath=null;
  const file=document.getElementById('planogram_file').files[0];
  if(file){planogramPath=await subirPlanograma(file,nombre);if(!planogramPath)return;}
  const{error}=await db.from('web_lineas').insert([{empresa_id:empresaId,nombre,gramaje_base:parseFloat(document.getElementById('gramaje_base').value)||null,unidad_base:document.getElementById('unidad_base').value||null,planogram_image:planogramPath,activa:true}]);
  if(error){captaToast('Error: '+error.message,'error');return;}
  captaToast(`Línea "${nombre}" creada`,'success');document.getElementById('createForm').reset();document.getElementById('planogram_preview_create').style.display='none';loadLineas();
});

waitDb(()=>loadLineas());
</script>
</body>
</html>
